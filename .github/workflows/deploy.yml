name: Deploy to GreasyFork

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version
        run: |
          RELEASE_VERSION=${{ github.event.release.tag_name }}
          echo "Release version: $RELEASE_VERSION"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Update version in script
        run: |
          # 读取当前版本号
          CURRENT_VERSION=$(grep -oP '@version\s+\K[\d.]+' ouchn-course-brusher.user.js)
          echo "Current version: $CURRENT_VERSION"
          echo "New version: ${{ env.RELEASE_VERSION }}"
          
          # 更新脚本中的版本号
          sed -i "s/@version\s*$CURRENT_VERSION/@version ${{ env.RELEASE_VERSION }}/" ouchn-course-brusher.user.js

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Deploy v${{ env.RELEASE_VERSION }} to GreasyFork"
          committer_name: GitHub Actions
          committer_email: actions@github.com
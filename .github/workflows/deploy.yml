name: Deploy to GreasyFork

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 1.3.1)'
        required: true
      update_readme:
        description: 'Update README version history'
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format! Use format like 1.3.1"
            exit 1
          fi
          echo "✓ Version format valid: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version in script
        run: |
          CURRENT_VERSION=$(grep -oP '@version\s+\K[\d.]+' ouchn-course-brusher.user.js)
          echo "Current version: $CURRENT_VERSION"
          echo "New version: ${{ env.VERSION }}"
          
          sed -i "s/@version\s*$CURRENT_VERSION/@version ${{ env.VERSION }}/" ouchn-course-brusher.user.js

      - name: Update README version history
        if: ${{ github.event.inputs.update_readme == 'true' }}
        run: |
          # 在版本历史开头添加新版本
          sed -i '/^## 版本历史/a\
          - v${{ env.VERSION }}: 待发布更新' README.md

                - name: Commit and push
                  uses: EndBug/add-and-commit@v9
                  with:
                    message: "Deploy v${{ env.VERSION }} to GreasyFork"
                    committer_name: GitHub Actions
                    committer_email: actions@github.com

                - name: Create Git tag
                  run: |
                    git tag -a "v${{ env.VERSION }}" -m "v${{ env.VERSION }}"
                    git push origin "v${{ env.VERSION }}"

name: Build Check

on:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Verify build output
        run: |
          if [ ! -f "dist/ouchn-course-brusher-vue.user.js" ]; then
            echo "❌ Build failed: dist/ouchn-course-brusher-vue.user.js not found"
            exit 1
          fi
          
          FILE_SIZE=$(stat -f%z "dist/ouchn-course-brusher-vue.user.js" 2>/dev/null || stat -c%s "dist/ouchn-course-brusher-vue.user.js")
          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "❌ Build failed: dist/ouchn-course-brusher-vue.user.js is empty"
            exit 1
          fi
          
          echo "✅ Build check passed"
          echo "📦 Output file: dist/ouchn-course-brusher-vue.user.js"
      
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/ouchn-course-brusher-vue.user.js
          retention-days: 30

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.0.0)，不填则从 package.json 读取'
        required: false
        type: string

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.ver }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version from package.json
        id: version
        run: |
          VER=$(node -p "require('./package.json').version")
          INPUT_VER="${{ github.event.inputs.version }}"
          FINAL_VER="${INPUT_VER:-$VER}"
          echo "ver=$FINAL_VER" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/ouchn-course-brusher-vue.user.js
          retention-days: 3

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 国家开放大学实验学院自动刷课脚本

            Vue3 版本，支持题目提取、刷课自动化。

            ### 更新内容
            请查看 [CHANGELOG](https://github.com/${{ github.repository }}/releases)

            ### 安装
            直接安装 `ouchn-course-brusher-vue.user.js` 文件即可
          files: dist/ouchn-course-brusher-vue.user.js
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release Asset (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual trigger - version: ${{ needs.build.outputs.version }}"
          # 创建 release 草稿
          VER="${{ needs.build.outputs.version }}"
          if [ -n "$VER" ]; then
            # 上传文件到 release（如果没有 tag）
            echo "Version: $VER"
            echo "请手动创建 Release 或推送 tag v$VER 触发自动发布"
          fi
